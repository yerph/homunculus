# homunculus nginx reverse proxy configuration
#
# CUSTOMIZE: Replace YOUR_DOMAIN with your actual domain
# CUSTOMIZE: Update SSL certificate paths if using Let's Encrypt
#
# This config assumes all services run on localhost.
# Cloudflare or another CDN/proxy can sit in front of this.

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # CUSTOMIZE: SSL certificate paths
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # --- Authentication ---
    # Simple cookie-based auth. The chat-server handles /login.
    # All routes except /login and PWA assets require the auth cookie.

    # Public routes (no auth)
    location = /login {
        proxy_pass http://127.0.0.1:4500;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /manifest.json {
        proxy_pass http://127.0.0.1:4500;
    }

    location = /sw.js {
        proxy_pass http://127.0.0.1:4500;
    }

    location ~ ^/icon-(192|512)\.png$ {
        proxy_pass http://127.0.0.1:4500;
    }

    # --- CC Bridge 内部接口（Claude Code 调用，无需 cookie）---
    location /cc-bridge/ {
        proxy_pass http://127.0.0.1:4500;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Chat Server (main frontend) ---
    location / {
        # CUSTOMIZE: Remove this auth check if you don't need it
        if ($cookie_companion_auth = "") {
            return 302 /login;
        }

        proxy_pass http://127.0.0.1:4500;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Phone Widget ---
    location /phone/ {
        proxy_pass http://127.0.0.1:4600/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Phone widget WebSocket
    location /phone/ws {
        proxy_pass http://127.0.0.1:4600;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Phone widget API
    location /phone/api/ {
        proxy_pass http://127.0.0.1:4600/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Chat WebSocket ---
    location /ws {
        proxy_pass http://127.0.0.1:4500;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
