<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<!-- CUSTOMIZE: change the title to your companion's name -->
<title>Companion</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a1d28">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
/* ============================================================
 *  CSS VARIABLES — NEUTRAL DARK THEME
 *  CUSTOMIZE: change these to match your aesthetic
 * ============================================================ */
:root {
  --bg: #1a1d28;
  --bg-light1: rgba(40, 45, 65, 0.5);
  --bg-light2: rgba(55, 60, 80, 0.35);
  --card: rgba(35, 40, 55, 0.75);
  --card-solid: #252a3a;
  --ink: #e0e4f0;
  --muted: #8b92a8;
  --weak: #5a6178;
  --accent: #7b8cb8;
  --line: rgba(130, 140, 170, 0.18);
  --shadow: 0 10px 30px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.15);
  --shadow-soft: 0 6px 18px rgba(0,0,0,0.2);

  /* Chat colors */
  --sent: #5b6fa8;
  --sent-ink: #fff;
  --recv: #2c3044;
  --recv-ink: #e0e4f0;

  /* Status colors */
  --good: #6daa88;
  --warm: #b87888;
  --gold: #c8a856;

  /* Phone frame */
  --phone-bg: #1a1d28;
  --shell-border: #14171f;
}

/* ============================================================
 *  BASE RESET
 * ============================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: radial-gradient(ellipse at 50% 15%, #222837 0%, #10131c 75%);
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; overflow: hidden;
  user-select: none; -webkit-user-select: none;
}
/* When embedded in an iframe, fill the container */
body.in-iframe {
  background: var(--bg) !important; display: block !important;
  width: 100% !important; height: 100% !important; overflow: hidden !important;
}
body.in-iframe #phone {
  width: 100% !important; height: 100% !important; min-height: 100vh;
  border-radius: 0 !important; box-shadow: none !important;
}
body.in-iframe #notch { display: none; }
body.in-iframe #statusbar { top: 0; padding-top: 6px; height: 32px; }
body.in-iframe .chat-header { padding-top: 38px; }

/* ============================================================
 *  PHONE SHELL
 * ============================================================ */
#phone {
  position: relative; width: 390px; height: 844px;
  background:
    radial-gradient(480px 320px at 18% 6%, var(--bg-light1), transparent 60%),
    radial-gradient(420px 300px at 85% 28%, var(--bg-light2), transparent 65%),
    var(--bg);
  border-radius: 50px;
  box-shadow: 0 0 0 10px var(--shell-border), 0 0 0 12px #2c3140, 0 38px 90px rgba(0,0,0,0.7);
  overflow: hidden; transform-origin: top center;
}
#notch {
  position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
  width: 118px; height: 32px; background: var(--shell-border); border-radius: 18px;
  z-index: 300; pointer-events: none;
}
#notch::after {
  content: ""; position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
  width: 9px; height: 9px; border-radius: 50%; background: #0e1018;
  box-shadow: inset 0 0 3px #2a3045;
}

/* ============================================================
 *  STATUS BAR
 * ============================================================ */
#statusbar {
  position: absolute; top: 0; left: 0; right: 0; height: 52px; z-index: 250;
  display: flex; justify-content: space-between; align-items: center;
  padding: 13px 28px 0; pointer-events: none;
  font-size: 13.5px; font-weight: 600; color: var(--ink);
}
#statusbar .right {
  display: flex; align-items: center; gap: 7px;
  font-size: 11px; font-weight: 500; color: var(--muted);
}
.batt {
  width: 24px; height: 12px; border: 1px solid var(--muted); border-radius: 4px;
  position: relative; padding: 1.5px; opacity: 0.9;
}
.batt::after {
  content: ""; position: absolute; right: -4px; top: 3px;
  width: 2px; height: 5px; background: var(--muted); border-radius: 0 2px 2px 0;
}
.batt b { display: block; height: 100%; width: 78%; background: var(--muted); border-radius: 2px; }

/* ============================================================
 *  SCREENS
 * ============================================================ */
.screen {
  position: absolute; inset: 0; display: none; flex-direction: column;
  z-index: 10; background: transparent;
}
.screen.active { display: flex; }

/* Shared card style */
.soft {
  background: var(--card); backdrop-filter: blur(22px) saturate(1.15);
  border-radius: 26px; box-shadow: var(--shadow);
  border: 1px solid rgba(130, 140, 170, 0.1);
}

/* ============================================================
 *  LOCK SCREEN
 * ============================================================ */
#lockscreen {
  z-index: 200; align-items: center;
  transition: transform 0.5s cubic-bezier(0.32, 0.72, 0.27, 1), opacity 0.5s;
}
#lockscreen.unlocking { transform: translateY(-100%); opacity: 0.25; }
#lock-time {
  margin-top: 124px; font-size: 88px; font-weight: 200; color: var(--ink);
  letter-spacing: -0.01em; line-height: 1;
}
#lock-date { margin-top: 10px; font-size: 15.5px; font-weight: 500; color: var(--muted); }
/* CUSTOMIZE: change this motto to your companion's tagline */
#lock-motto {
  margin-top: 6px; font-size: 11.5px; color: var(--weak);
  letter-spacing: 0.14em;
}
#lock-note {
  margin-top: 34px; width: min(330px, 87%); padding: 13px 16px;
  display: flex; gap: 12px; align-items: center; border-radius: 22px;
}
#lock-note .ic {
  width: 38px; height: 38px; border-radius: 50%; background: var(--card-solid);
  box-shadow: var(--shadow-soft); display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 14px; font-weight: 600; color: var(--accent);
}
#lock-note .tx b { display: block; font-size: 13.5px; font-weight: 600; color: var(--ink); }
#lock-note .tx span { font-size: 12.5px; color: var(--muted); }
#unlock-hint {
  position: absolute; bottom: 46px; font-size: 12.5px; color: var(--muted);
  letter-spacing: 0.1em; animation: floaty 2.4s ease-in-out infinite;
}
@keyframes floaty {
  0%, 100% { transform: translateY(0); opacity: 0.85; }
  50% { transform: translateY(-7px); opacity: 0.4; }
}

/* ============================================================
 *  CHAT APP (iMessage style)
 * ============================================================ */
#app-chat { background: var(--phone-bg); }
.chat-header {
  padding: 8px 16px 10px; text-align: center;
  border-bottom: 1px solid var(--line); background: var(--card);
  backdrop-filter: blur(12px);
  /* Account for the status bar */
  padding-top: 56px;
}
.chat-contact { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.chat-avatar {
  width: 48px; height: 48px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: #fff;
  /* CUSTOMIZE: change the avatar background gradient */
  background: linear-gradient(135deg, #3a4060, #252a3e);
}
/* CUSTOMIZE: change the contact name */
.chat-contact-name { font-size: 1rem; font-weight: 500; color: var(--ink); }
.chat-contact-sub {
  font-size: 0.5rem; color: var(--weak); letter-spacing: 0.05em;
}
#chat-status {
  font-size: 0.45rem; margin-top: 2px; padding: 1px 8px; border-radius: 8px;
  background: rgba(255,255,255,0.06); color: var(--weak); letter-spacing: 0.03em;
}

/* ============================================================
 *  设置面板
 * ============================================================ */
#settings-btn {
  position: absolute; top: 12px; right: 14px;
  width: 26px; height: 26px; border-radius: 50%;
  background: transparent; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted); font-size: 15px; padding: 0;
  transition: color 0.2s;
  z-index: 10;
}
#settings-btn:hover { color: var(--ink); }

#settings-panel {
  position: absolute; inset: 0; z-index: 100;
  background: var(--bg); display: none; flex-direction: column;
  overflow-y: auto;
}
#settings-panel.open { display: flex; }

.settings-header {
  display: flex; align-items: center; gap: 10px;
  padding: 60px 20px 16px;
  border-bottom: 1px solid var(--line);
}
.settings-header button {
  background: transparent; border: none; cursor: pointer;
  color: var(--accent); font-size: 14px; padding: 0; line-height: 1;
}
.settings-header h2 {
  font-size: 16px; font-weight: 600; color: var(--ink); flex: 1;
}

.settings-section {
  padding: 18px 20px 4px;
  font-size: 10px; font-weight: 600; color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase;
}

.settings-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 20px; border-bottom: 1px solid var(--line);
}
.settings-row label {
  font-size: 13.5px; color: var(--ink);
}
.settings-row .hint {
  font-size: 11px; color: var(--muted); margin-top: 2px;
}

/* 模式切换 toggle */
.mode-toggle {
  display: flex; border-radius: 10px; overflow: hidden;
  border: 1px solid var(--line); background: var(--card-solid);
}
.mode-toggle button {
  padding: 5px 14px; font-size: 12px; border: none; cursor: pointer;
  background: transparent; color: var(--muted); transition: all 0.2s;
}
.mode-toggle button.active {
  background: var(--accent); color: #fff;
}

/* 输入框 */
.settings-input {
  width: 100%; background: var(--card-solid); border: 1px solid var(--line);
  border-radius: 10px; padding: 8px 12px; color: var(--ink);
  font-size: 13px; font-family: inherit; outline: none; margin-top: 6px;
}
.settings-input:focus { border-color: var(--accent); }
.settings-input::placeholder { color: var(--weak); }

.settings-field {
  padding: 10px 20px; border-bottom: 1px solid var(--line);
}
.settings-field > label {
  font-size: 11.5px; color: var(--muted);
}

.settings-save {
  margin: 18px 20px; padding: 11px;
  background: var(--accent); border: none; border-radius: 12px;
  color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
  transition: opacity 0.2s;
}
.settings-save:hover { opacity: 0.85; }

.settings-api-fields { display: none; }
.settings-api-fields.visible { display: block; }
.chat-messages {
  padding: 16px; flex: 1; min-height: 0; overflow-y: auto;
  display: flex; flex-direction: column; gap: 3px;
}
.chat-messages::-webkit-scrollbar { width: 3px; }
.chat-messages::-webkit-scrollbar-thumb { background: rgba(130,140,170,0.2); border-radius: 2px; }
.chat-ts {
  text-align: center; font-size: 0.5rem; color: var(--weak);
  padding: 10px 0 4px; letter-spacing: 0.05em;
}
.chat-msg {
  display: flex; gap: 6px; padding: 1px 0; align-items: flex-end;
  animation: msgIn 0.4s ease;
}
.chat-msg.sent { justify-content: flex-end; }
.chat-msg.recv { justify-content: flex-start; }
.chat-msg .msg-av {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.6rem; color: #fff;
}
.chat-msg.sent .msg-av { background: var(--sent); order: 2; }
.chat-msg.recv .msg-av { background: linear-gradient(135deg, #3a4060, #252a3e); }
.chat-bubble {
  max-width: 72%; padding: 8px 14px; border-radius: 18px;
  font-size: 0.88rem; line-height: 1.4; word-wrap: break-word;
}
.chat-msg.sent .chat-bubble {
  background: var(--sent); color: var(--sent-ink); border-bottom-right-radius: 6px;
}
.chat-msg.recv .chat-bubble {
  background: var(--recv); color: var(--recv-ink); border-bottom-left-radius: 6px;
}
.chat-delivery {
  text-align: right; font-size: 0.5rem; color: var(--weak); padding: 2px 32px 0;
}
@keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.chat-input-bar {
  display: flex; align-items: center; gap: 8px; padding: 10px 14px;
  border-top: 1px solid var(--line); background: var(--card); flex-shrink: 0;
  /* Safe area for phones with home indicator */
  padding-bottom: max(10px, env(safe-area-inset-bottom));
}
.chat-input {
  flex: 1; background: var(--recv); border: 1px solid var(--line); border-radius: 20px;
  padding: 8px 14px; color: var(--ink); font-size: 0.85rem; outline: none;
  font-family: inherit;
}
.chat-input::placeholder { color: var(--weak); font-style: italic; }
.chat-send {
  width: 32px; height: 32px; border-radius: 50%; background: var(--sent);
  border: none; color: #fff; font-size: 0.8rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: opacity 0.2s;
}
.chat-send:hover { opacity: 0.8; }
</style>
</head>
<body>

<div id="phone">
  <div id="notch"></div>
  <div id="statusbar">
    <span id="sb-time">9:41</span>
    <div class="right">
      <!-- CUSTOMIZE: change this label -->
      <span>companion</span>
      <div class="batt"><b></b></div>
    </div>
  </div>

  <!-- ============================================================
       LOCK SCREEN
       ============================================================ -->
  <div id="lockscreen" class="screen active">
    <div id="lock-time">--:--</div>
    <div id="lock-date">--</div>
    <!-- CUSTOMIZE: change the lock screen motto -->
    <div id="lock-motto">companion online</div>
    <div id="lock-note" class="soft">
      <!-- CUSTOMIZE: change the notification preview -->
      <div class="ic">C</div>
      <div class="tx">
        <b>Companion</b>
        <span>Tap to open your phone.</span>
      </div>
    </div>
    <div id="unlock-hint">tap to wake</div>
  </div>

  <!-- ============================================================
       APP: CHAT (opens directly after unlock)
       ============================================================ -->
  <div id="app-chat" class="screen">
    <div class="chat-header" style="position:relative;">
      <div class="chat-contact">
        <!-- CUSTOMIZE: change avatar letter and name -->
        <div class="chat-avatar">C</div>
        <div class="chat-contact-name">Companion</div>
        <div class="chat-contact-sub">real-time chat</div>
        <div id="chat-status">connecting...</div>
      </div>
      <button id="settings-btn" onclick="openSettings()" title="Settings">&#9881;</button>
    </div>
    <div class="chat-messages" id="chat-msgs"></div>
    <div class="chat-input-bar">
      <input class="chat-input" id="chat-input" placeholder="Type a message..."
             onkeypress="if(event.key==='Enter')sendChatMsg()">
      <button class="chat-send" onclick="sendChatMsg()">&#8593;</button>
    </div>

    <!-- 设置面板 (叠在 chat 上层) -->
    <div id="settings-panel">
      <div class="settings-header">
        <button onclick="closeSettings()">&#8592;</button>
        <h2>Settings</h2>
      </div>

      <div class="settings-section">Mode</div>
      <div class="settings-row">
        <div>
          <div style="font-size:13.5px;color:var(--ink);">Chat mode</div>
          <div class="hint">CC: routes via Claude Code&nbsp;&nbsp;API: direct LLM call</div>
        </div>
        <div class="mode-toggle">
          <button id="mode-cc-btn" onclick="setMode('cc')">CC</button>
          <button id="mode-api-btn" onclick="setMode('api')">API</button>
        </div>
      </div>

      <div class="settings-api-fields" id="api-fields">
        <div class="settings-section">API Provider</div>
        <div class="settings-field">
          <label>Endpoint URL</label>
          <input class="settings-input" id="cfg-endpoint"
                 placeholder="https://api.anthropic.com/v1/messages">
        </div>
        <div class="settings-field">
          <label>API Key</label>
          <input class="settings-input" id="cfg-key" type="password"
                 placeholder="sk-…">
        </div>
        <div class="settings-field" style="padding-bottom:14px;">
          <label>Model</label>
          <input class="settings-input" id="cfg-model"
                 placeholder="claude-opus-4-5">
        </div>

        <div class="settings-section">Persona</div>
        <div class="settings-field" style="padding-bottom:14px;">
          <label>System prompt (optional)</label>
          <textarea class="settings-input" id="cfg-sysprompt" rows="4"
                    placeholder="You are a helpful assistant."
                    style="resize:none;line-height:1.5;"></textarea>
        </div>
      </div>

      <button class="settings-save" onclick="saveSettings()">Save</button>
    </div>
  </div>

</div>

<!-- ============================================================
     JAVASCRIPT
     ============================================================ -->
<script>
/* Global error overlay for debugging */
window.onerror = function(msg, url, line) {
  var d = document.createElement('div');
  d.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:red;color:#fff;font-size:11px;padding:6px 10px;z-index:99999;word-break:break-all';
  d.textContent = 'JS ERROR L' + line + ': ' + msg;
  document.body.appendChild(d);
};

/* Detect iframe embedding */
if (window.parent !== window) {
  document.body.classList.add('in-iframe');
}

/* ============================================================
 *  UTILITY
 * ============================================================ */
var $ = function(s) { return document.querySelector(s); };

function pad(n) { return String(n).padStart(2, '0'); }

function escapeHtml(text) {
  return text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

/* ============================================================
 *  SCREEN NAVIGATION
 * ============================================================ */
var currentScreen = 'lockscreen';

function show(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  $('#' + id).classList.add('active');
  currentScreen = id;
}

/* ============================================================
 *  PHONE SCALING (for desktop viewing)
 * ============================================================ */
function fit() {
  var ph = $('#phone');
  if (document.body.classList.contains('in-iframe')) {
    ph.style.transform = ''; ph.style.marginTop = '';
    return;
  }
  var w = innerWidth, h = innerHeight;
  var sc = Math.min(w / 418, h / 872, 1);
  if (sc < 1) {
    ph.style.transform = 'scale(' + sc + ')';
    ph.style.marginTop = Math.max((h - 844 * sc) / 2, 6) + 'px';
  } else {
    ph.style.transform = ''; ph.style.marginTop = '';
  }
}
addEventListener('resize', fit);
fit();

/* ============================================================
 *  CLOCK
 * ============================================================ */
function tickTime() {
  var d = new Date();
  var t = d.getHours() + ':' + pad(d.getMinutes());
  $('#sb-time').textContent = t;
  $('#lock-time').textContent = t;
  var days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  $('#lock-date').textContent = days[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate();
}
tickTime();
setInterval(tickTime, 1000);

/* ============================================================
 *  LOCK SCREEN — tap or swipe up to unlock
 *  Unlocking goes directly to the chat screen.
 * ============================================================ */
(function() {
  var ls = $('#lockscreen');
  var startY = null, unlocking = false;

  ls.addEventListener('touchstart', function(e) { startY = e.touches[0].clientY; }, { passive: true });
  ls.addEventListener('touchend', function(e) {
    if (startY !== null && startY - e.changedTouches[0].clientY > 60) unlock();
    startY = null;
  });
  ls.addEventListener('click', unlock);

  function unlock() {
    if (unlocking) return;
    unlocking = true;
    ls.classList.add('unlocking');
    setTimeout(function() {
      show('app-chat');
      loadChatHistory();
      ls.classList.remove('unlocking');
      unlocking = false;
    }, 460);
  }
})();

/* ============================================================
 *  设置面板 — localStorage 存储
 * ============================================================ */

var appSettings = {
  mode: 'cc',           // 'cc' | 'api'
  endpoint: '',
  key: '',
  model: '',
  system_prompt: ''
};

function loadSettings() {
  try {
    var raw = localStorage.getItem('pw_settings');
    if (raw) appSettings = JSON.parse(raw);
  } catch (e) {}
}

function persistSettings() {
  try { localStorage.setItem('pw_settings', JSON.stringify(appSettings)); } catch (e) {}
}

function openSettings() {
  /* 填充表单 */
  setMode(appSettings.mode, true);
  $('#cfg-endpoint').value = appSettings.endpoint || '';
  $('#cfg-key').value = appSettings.key ? '***' + appSettings.key.slice(-4) : '';
  $('#cfg-model').value = appSettings.model || '';
  $('#cfg-sysprompt').value = appSettings.system_prompt || '';
  $('#settings-panel').classList.add('open');
}

function closeSettings() {
  $('#settings-panel').classList.remove('open');
}

function setMode(m, silent) {
  appSettings.mode = m;
  $('#mode-cc-btn').classList.toggle('active', m === 'cc');
  $('#mode-api-btn').classList.toggle('active', m === 'api');
  var apiFields = $('#api-fields');
  if (apiFields) apiFields.classList.toggle('visible', m === 'api');
  if (!silent) persistSettings();
  updateChatStatus();
}

function saveSettings() {
  appSettings.endpoint = $('#cfg-endpoint').value.trim();
  var rawKey = $('#cfg-key').value.trim();
  /* 只在用户实际输入了新 key 时才覆盖 */
  if (rawKey && !rawKey.startsWith('***')) appSettings.key = rawKey;
  appSettings.model = $('#cfg-model').value.trim();
  appSettings.system_prompt = $('#cfg-sysprompt').value;
  persistSettings();

  /* 同步 server 端 config */
  if (appSettings.mode === 'api') {
    var payload = {
      providers: [{
        name: 'Custom',
        endpoint: appSettings.endpoint,
        key: appSettings.key,
        model: appSettings.model,
        active: true
      }],
      system_prompt: appSettings.system_prompt
    };
    fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).catch(function() {});
  }

  closeSettings();
}

/* ============================================================
 *  WEBSOCKET — real-time chat connection (CC mode)
 * ============================================================ */

/* CUSTOMIZE: set this to match AUTH_TOKEN in server.js (empty string = no auth) */
var WS_TOKEN = '';

var ws = null, wsReady = false, ccOnline = false;
var reconnTimer = null;

function connectWS() {
  if (appSettings.mode === 'api') return; /* API 模式不需要 WebSocket */
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  var url = proto + '//' + location.host + '/';
  ws = new WebSocket(url);

  ws.onopen = function() {
    if (WS_TOKEN) {
      ws.send(JSON.stringify({ type: 'auth', token: WS_TOKEN }));
    }
    /* If no token needed, server auto-auths on connect */
  };

  ws.onmessage = function(e) {
    var msg;
    try { msg = JSON.parse(e.data); } catch(er) { return; }

    if (msg.type === 'ping') {
      try { ws.send(JSON.stringify({ type: 'pong' })); } catch(ex) {}
      return;
    }

    if (msg.type === 'auth_ok') {
      wsReady = true;
      ccOnline = true;
      updateChatStatus();
    }

    if (msg.type === 'auth_fail') {
      wsReady = false;
      updateChatStatus();
    }

    /* Incoming assistant message */
    if (msg.type === 'message' && msg.role === 'assistant') {
      appendChatBubble(msg.content || '', false);
      removeTypingIndicator();
    }

    if (msg.type === 'cc_status') {
      ccOnline = msg.alive;
      updateChatStatus();
    }

    if (msg.type === 'cc_busy') {
      if (msg.busy) { showTypingIndicator(); } else { removeTypingIndicator(); }
    }

    if (msg.type === 'error') {
      removeTypingIndicator();
    }
  };

  ws.onclose = function() {
    wsReady = false; ccOnline = false;
    updateChatStatus();
    if (appSettings.mode !== 'api' && !reconnTimer) {
      reconnTimer = setTimeout(function() { reconnTimer = null; connectWS(); }, 3000);
    }
  };

  ws.onerror = function() {};
}

function updateChatStatus() {
  var el = $('#chat-status');
  if (!el) return;
  if (appSettings.mode === 'api') {
    el.textContent = appSettings.endpoint ? 'api mode' : 'api — not configured';
  } else {
    el.textContent = ccOnline ? 'online' : 'offline';
  }
}

/* ============================================================
 *  API 模式 — SSE 流式聊天
 * ============================================================ */

/* 简单对话历史 (API 模式下的上下文窗口) */
var apiHistory = [];

function sendViaAPI(text) {
  if (!appSettings.endpoint || !appSettings.key || !appSettings.model) {
    appendChatBubble('API not configured. Tap ⚙ to add endpoint, key, and model.', false);
    return;
  }

  apiHistory.push({ role: 'user', content: text });

  var bubble = null;
  var accumulated = '';

  function getOrCreateBubble() {
    if (bubble) return;
    /* 创建流式接收气泡 */
    var el = $('#chat-msgs');
    if (!el) return;
    var div = document.createElement('div');
    div.className = 'chat-msg recv';
    div.innerHTML =
      '<div class="msg-av" style="background:linear-gradient(135deg,#3a4060,#252a3e)">C</div>' +
      '<div class="chat-bubble" id="streaming-bubble"></div>';
    el.appendChild(div);
    bubble = div.querySelector('#streaming-bubble');
    el.scrollTop = el.scrollHeight;
  }

  removeTypingIndicator();
  showTypingIndicator();

  var payload = {
    messages: apiHistory.slice(),
    system_prompt: appSettings.system_prompt || ''
  };

  fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).then(function(res) {
    removeTypingIndicator();
    if (!res.ok) {
      return res.json().then(function(e) {
        appendChatBubble('Error: ' + (e.error || res.status), false);
      });
    }

    var reader = res.body.getReader();
    var decoder = new TextDecoder();
    var sseBuffer = '';

    function readChunk() {
      return reader.read().then(function(result) {
        if (result.done) {
          /* 流结束 — 提交 assistant 消息到历史 */
          if (accumulated) {
            apiHistory.push({ role: 'assistant', content: accumulated });
            if (bubble) bubble.removeAttribute('id'); /* 清除 id */
          }
          return;
        }
        sseBuffer += decoder.decode(result.value, { stream: true });
        var lines = sseBuffer.split('\n');
        sseBuffer = lines.pop();
        lines.forEach(function(line) {
          if (!line.startsWith('data: ')) return;
          var raw = line.slice(6).trim();
          if (raw === '[DONE]') return;
          var evt;
          try { evt = JSON.parse(raw); } catch (e) { return; }
          if (evt.type === 'content' && evt.content) {
            getOrCreateBubble();
            accumulated += evt.content;
            if (bubble) {
              bubble.textContent = accumulated;
              var el = $('#chat-msgs');
              if (el) el.scrollTop = el.scrollHeight;
            }
          }
          if (evt.type === 'error') {
            removeTypingIndicator();
            appendChatBubble('Error: ' + (evt.message || 'unknown'), false);
          }
        });
        return readChunk();
      });
    }

    return readChunk();
  }).catch(function(e) {
    removeTypingIndicator();
    appendChatBubble('Network error: ' + e.message, false);
  });
}

/* ============================================================
 *  CHAT — message rendering
 * ============================================================ */

function loadChatHistory() {
  fetch('/api/recent').then(function(r) { return r.json(); }).then(function(msgs) {
    var el = $('#chat-msgs');
    if (!el) return;
    el.innerHTML = '';
    var lastDate = '';
    msgs.forEach(function(m) {
      var d = new Date(m.ts);
      var dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      if (dateStr !== lastDate) {
        el.innerHTML += '<div class="chat-ts">' + dateStr + '</div>';
        lastDate = dateStr;
      }
      var isSent = m.role === 'user';
      appendChatBubbleRaw(el, m.content || '', isSent, false);
    });
    setTimeout(function(){ el.scrollTop = el.scrollHeight; }, 50);
  }).catch(function() {});
}

function appendChatBubbleRaw(container, text, isSent, animate) {
  var cls = isSent ? 'sent' : 'recv';
  /* CUSTOMIZE: change avatar letters */
  var avLetter = isSent ? 'U' : 'C';
  var avStyle = isSent
    ? 'background:var(--sent)'
    : 'background:linear-gradient(135deg,#3a4060,#252a3e)';
  var div = document.createElement('div');
  div.className = 'chat-msg ' + cls;
  if (!animate) div.style.animation = 'none';
  div.innerHTML =
    '<div class="msg-av" style="' + avStyle + '">' + avLetter + '</div>' +
    '<div class="chat-bubble">' + escapeHtml(text) + '</div>';
  container.appendChild(div);
}

function appendChatBubble(text, isSent) {
  var el = $('#chat-msgs');
  if (!el) return;
  appendChatBubbleRaw(el, text, isSent, true);
  el.scrollTop = el.scrollHeight;
}

function showTypingIndicator() {
  var el = $('#chat-msgs');
  if (!el || el.querySelector('.typing-indicator')) return;
  var div = document.createElement('div');
  div.className = 'chat-msg recv typing-indicator';
  /* CUSTOMIZE: change the avatar letter */
  div.innerHTML =
    '<div class="msg-av" style="background:linear-gradient(135deg,#3a4060,#252a3e)">C</div>' +
    '<div class="chat-bubble" style="opacity:.5;font-style:italic;">typing...</div>';
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function removeTypingIndicator() {
  var el = $('#chat-msgs');
  if (!el) return;
  var t = el.querySelector('.typing-indicator');
  if (t) t.remove();
}

function sendChatMsg() {
  var input = $('#chat-input');
  var text = input.value.trim();
  if (!text) return;
  input.value = '';

  /* Show locally immediately */
  appendChatBubble(text, true);

  if (appSettings.mode === 'api') {
    /* API 模式 — SSE 流式 */
    sendViaAPI(text);
    return;
  }

  /* CC 模式 — WebSocket or HTTP fallback */
  if (ws && ws.readyState === WebSocket.OPEN && wsReady) {
    ws.send(JSON.stringify({ type: 'message', content: text }));
  } else {
    /* Fallback: send via HTTP */
    fetch('/api/message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: text }),
    });
  }
}

/* ============================================================
 *  INIT — load settings, connect WebSocket, load initial data
 * ============================================================ */
loadSettings();
connectWS();
updateChatStatus();

/* Service Worker registration for PWA support */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(function() {});
}
</script>
