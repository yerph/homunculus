<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<!-- CUSTOMIZE: Change the page title -->
<title>Companion Chat</title>
<style>
/* ================================================================
   CSS Variables — CUSTOMIZE these to theme the entire UI
   ================================================================ */
:root {
  --bg:         #1a1a2e;
  --bg-surface: #16162a;
  --bg-input:   rgba(255,255,255,0.06);
  --border:     rgba(255,255,255,0.08);
  --accent:     #6c8cff;
  --accent-dim: rgba(108,140,255,0.25);
  --accent-text:#fff;
  --text:       #e0e0e8;
  --text-dim:   rgba(224,224,232,0.45);
  --text-muted: rgba(224,224,232,0.3);
  --recv-bg:    rgba(255,255,255,0.06);
  --sent-bg:    rgba(108,140,255,0.15);
  --code-bg:    #0d0d1a;
  --font:       -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono:  "SF Mono", "Fira Code", monospace;
}

[data-theme="light"] {
  --bg:         #f5f5f7;
  --bg-surface: #eeeef0;
  --bg-input:   rgba(0,0,0,0.04);
  --border:     rgba(0,0,0,0.08);
  --accent:     #4a6cf7;
  --accent-dim: rgba(74,108,247,0.15);
  --text:       #1a1a2e;
  --text-dim:   rgba(26,26,46,0.5);
  --text-muted: rgba(26,26,46,0.25);
  --recv-bg:    rgba(0,0,0,0.04);
  --sent-bg:    rgba(74,108,247,0.12);
  --code-bg:    #e8e8ee;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }

/* ================================================================
   Auth overlay
   ================================================================ */
#auth-overlay {
  position: fixed; inset: 0; background: var(--bg); z-index: 1000;
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
}
#auth-overlay h1 { font-size: 1.6rem; font-weight: 600; color: var(--accent); }
#auth-overlay input {
  width: 260px; padding: 12px 16px;
  background: var(--bg-input); border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-size: 1rem; font-family: var(--font); outline: none; text-align: center;
}
#auth-overlay input:focus { border-color: var(--accent-dim); }
#auth-error { color: #e06070; font-size: 0.85rem; min-height: 1.2em; }

/* ================================================================
   Layout
   ================================================================ */
#app { display: none; height: 100%; flex-direction: column; }

#header {
  padding: 12px 16px; display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
/* CUSTOMIZE: companion name */
#header h1 { font-size: 1.15rem; font-weight: 600; flex: 1; }
#cc-status { font-size: 0.7rem; color: var(--text-dim); font-family: var(--font-mono); }
.header-btn {
  background: none; border: none; color: var(--text-dim); cursor: pointer;
  font-size: 1.1rem; padding: 4px 8px; border-radius: 6px; transition: color 0.15s;
}
.header-btn:hover { color: var(--accent); }

/* ================================================================
   Chat area
   ================================================================ */
#chat-area {
  flex: 1; overflow-y: auto; padding: 16px 20px;
  display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth;
}
#chat-area::-webkit-scrollbar { width: 3px; }
#chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg { max-width: 75%; animation: fadeIn 0.2s ease; }
.msg.sent { align-self: flex-end; }
.msg.recv { align-self: flex-start; }

.bubble {
  padding: 10px 14px; border-radius: 18px; line-height: 1.6; word-wrap: break-word;
}
.msg.sent .bubble { background: var(--sent-bg); border-bottom-right-radius: 4px; }
.msg.recv .bubble { background: var(--recv-bg); border-bottom-left-radius: 4px; }

.msg-ts {
  font-size: 0.65rem; color: var(--text-muted); margin-top: 3px; font-family: var(--font-mono);
}
.msg.sent .msg-ts { text-align: right; }

/* Markdown in assistant messages */
.md p { margin: 0.4em 0; }
.md strong { color: var(--accent); }
.md code {
  background: var(--code-bg); padding: 2px 6px; border-radius: 4px;
  font-family: var(--font-mono); font-size: 0.85em;
}
.md pre {
  background: var(--code-bg); padding: 12px; border-radius: 8px;
  overflow-x: auto; margin: 0.6em 0; position: relative;
}
.md pre code { background: none; padding: 0; font-size: 0.85rem; }
.md ul, .md ol { margin: 0.4em 0; padding-left: 1.4em; }
.md blockquote { border-left: 3px solid var(--accent-dim); padding-left: 10px; margin: 0.4em 0; color: var(--text-dim); }
.md a { color: var(--accent); text-decoration: none; }
.copy-btn {
  position: absolute; top: 6px; right: 6px;
  background: var(--bg-input); border: 1px solid var(--border);
  color: var(--text-dim); padding: 2px 8px; border-radius: 4px;
  cursor: pointer; font-size: 0.7rem; opacity: 0; transition: opacity 0.2s;
}
.md pre:hover .copy-btn { opacity: 1; }

/* Typing indicator */
.typing { display: none; align-self: flex-start; padding: 10px 18px; background: var(--recv-bg); border-radius: 18px 18px 18px 4px; }
.typing.on { display: block; }
.typing span {
  display: inline-block; width: 6px; height: 6px; background: var(--text-dim);
  border-radius: 50%; margin: 0 2px; animation: dot 1.4s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
@keyframes dot { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-4px); opacity: 1; } }

/* ================================================================
   Input bar
   ================================================================ */
#input-bar {
  padding: 10px 16px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; align-items: flex-end; background: var(--bg-surface); flex-shrink: 0;
}
#msg-input {
  flex: 1; background: var(--bg-input); border: 1px solid var(--border);
  border-radius: 20px; padding: 10px 16px; color: var(--text);
  font-size: 1rem; font-family: var(--font); outline: none;
  resize: none; max-height: 140px; line-height: 1.5;
}
#msg-input:focus { border-color: var(--accent-dim); }
#msg-input::placeholder { color: var(--text-muted); }
#send-btn {
  width: 38px; height: 38px; border-radius: 50%; border: none;
  background: var(--accent); color: var(--accent-text);
  cursor: pointer; font-size: 1.1rem; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
#send-btn:disabled { opacity: 0.4; cursor: default; }

@media (max-width: 600px) {
  .msg { max-width: 88%; }
  #chat-area { padding: 12px; }
  #input-bar { padding: 8px 12px; }
}
</style>
</head>
<body>

<!-- Auth -->
<div id="auth-overlay">
  <!-- CUSTOMIZE: login screen title -->
  <h1>Companion</h1>
  <input type="password" id="auth-input" placeholder="password" autocomplete="off">
  <div id="auth-error"></div>
</div>

<!-- App -->
<div id="app">
  <div id="header">
    <!-- CUSTOMIZE: display name -->
    <h1>Companion</h1>
    <span id="cc-status"></span>
    <button class="header-btn" id="theme-toggle" title="Toggle theme">&#9681;</button>
  </div>

  <div id="chat-area"></div>
  <div class="typing" id="typing"><span></span><span></span><span></span></div>

  <div id="input-bar">
    <!-- CUSTOMIZE: placeholder text -->
    <textarea id="msg-input" rows="1" placeholder="Type a message..."></textarea>
    <button id="send-btn" title="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const $ = id => document.getElementById(id);
let sending = false, pollTimer = null, pollSince = 0;

marked.setOptions({ breaks: true });

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function copyCode(btn) { navigator.clipboard.writeText(btn.nextElementSibling.textContent); btn.textContent = '✓'; setTimeout(() => btn.textContent = 'copy', 1500); }

function renderMd(text) {
  if (!text) return '';
  let html = marked.parse(text);
  html = html.replace(/<pre><code/g, '<pre><button class="copy-btn" onclick="copyCode(this)">copy</button><code');
  return html;
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

// --- Auth ---
async function tryAuth(token) {
  try {
    const r = await fetch('/api/health', { headers: token ? { 'x-auth-token': token } : {} });
    if (r.ok) {
      localStorage.setItem('chat_token', token);
      $('auth-overlay').style.display = 'none';
      $('app').style.display = 'flex';
      init();
      return true;
    }
  } catch (e) { $('auth-error').textContent = 'Connection error'; }
  return false;
}

$('auth-input').addEventListener('keydown', async e => {
  if (e.key === 'Enter') {
    if (!(await tryAuth($('auth-input').value.trim()))) $('auth-error').textContent = 'Wrong password';
  }
});

const saved = localStorage.getItem('chat_token') || '';
tryAuth(saved).then(ok => { if (!ok) tryAuth('').then(ok2 => { if (!ok2) $('auth-overlay').style.display = 'flex'; }); });

function headers() {
  const h = { 'Content-Type': 'application/json' };
  const t = localStorage.getItem('chat_token');
  if (t) h['x-auth-token'] = t;
  return h;
}

// --- Messages ---
function addMsg(msg, animate) {
  const el = document.createElement('div');
  el.className = 'msg ' + (msg.role === 'user' ? 'sent' : 'recv');
  el.dataset.id = msg.id || '';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (msg.role === 'user') {
    bubble.textContent = msg.content;
  } else {
    const md = document.createElement('div');
    md.className = 'md';
    md.innerHTML = renderMd(msg.content);
    bubble.appendChild(md);
  }

  const ts = document.createElement('div');
  ts.className = 'msg-ts';
  ts.textContent = formatTime(msg.ts);

  el.appendChild(bubble);
  el.appendChild(ts);
  $('chat-area').appendChild(el);

  if (!animate) el.style.animation = 'none';
  const ca = $('chat-area');
  if (ca.scrollHeight - ca.scrollTop - ca.clientHeight < 100) ca.scrollTop = ca.scrollHeight;
}

// --- Send ---
async function sendMessage() {
  const input = $('msg-input');
  const text = input.value.trim();
  if (!text || sending) return;

  input.value = ''; autoResize();
  addMsg({ id: 'p_' + Date.now(), role: 'user', content: text, ts: Date.now() }, true);

  sending = true; $('send-btn').disabled = true;
  try {
    const r = await fetch('/api/message', { method: 'POST', headers: headers(), body: JSON.stringify({ content: text }) });
    if (r.ok) $('typing').classList.add('on');
  } catch (e) { addMsg({ role: 'assistant', content: 'Error: ' + e.message, ts: Date.now() }, true); }
  sending = false; $('send-btn').disabled = false; input.focus();
}

function autoResize() { const el = $('msg-input'); el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 140) + 'px'; }
$('msg-input').addEventListener('input', autoResize);
$('msg-input').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
$('send-btn').addEventListener('click', sendMessage);

// --- Poll ---
async function poll() {
  try {
    const r = await fetch('/cc-poll?since=' + pollSince, { headers: headers() });
    if (!r.ok) return;
    const data = await r.json();
    $('cc-status').textContent = data.cc_alive ? 'connected' : 'waiting for CC';
    pollSince = data.t || Date.now();
    if (data.messages && data.messages.length) {
      $('typing').classList.remove('on');
      data.messages.forEach(m => addMsg({ id: 'm_' + Date.now().toString(36), role: m.role || 'assistant', content: m.content, ts: m.ts || Date.now() }, true));
    }
  } catch {}
}

// --- Theme ---
function setTheme(t) { document.documentElement.setAttribute('data-theme', t); localStorage.setItem('chat-theme', t); }
$('theme-toggle').addEventListener('click', () => {
  setTheme((document.documentElement.getAttribute('data-theme') || 'dark') === 'light' ? 'dark' : 'light');
});
(function() { const s = localStorage.getItem('chat-theme'); if (s) setTheme(s); })();

// --- Init ---
async function init() {
  try {
    const r = await fetch('/api/messages', { headers: headers() });
    if (r.ok) { (await r.json()).forEach(m => addMsg(m, false)); $('chat-area').scrollTop = $('chat-area').scrollHeight; }
  } catch {}
  pollSince = Date.now() - 5000;
  pollTimer = setInterval(poll, 1500);
  $('msg-input').focus();
}
</script>
</body>
</html>
