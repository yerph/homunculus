.msg-row{display:flex;gap:8px;align-items:flex-start;max-width:92%}.msg-row.u-row{align-self:flex-end;flex-direction:row-reverse;width:fit-content}.msg-row.s-row{align-self:flex-start}

#ib{padding:12px 16px;border-top:1px solid var(--gb);display:flex;gap:8px;align-items:flex-end;background:var(--sbg)}

#sr-results{padding:0 8px;overflow-y:auto;max-height:calc(100vh - 180px);-webkit-overflow-scrolling:touch}
.sr-item{padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:2px;transition:background 0.15s}
.sr-item:hover{background:rgba(255,255,255,0.04)}
.sr-item .sr-title{font-size:0.7rem;color:var(--accent);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-item .sr-text{font-size:0.8rem;color:var(--tx);line-height:1.4}
.sr-item .sr-text mark{background:rgba(108,140,255,0.3);color:var(--tx);border-radius:2px;padding:0 1px}

.sr-empty{text-align:center;padding:20px;color:var(--td);font-size:0.8rem;font-style:italic}
#cal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center}
#cal-ov.show{display:flex}
#cal-box{background:var(--bg);border:1px solid var(--gb);border-radius:12px;padding:20px;width:300px;max-width:90vw}
#cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
#cal-nav button{background:none;border:none;color:var(--td);cursor:pointer;font-size:1.2rem;padding:4px 10px}
#cal-nav button:hover{color:var(--accent)}
#cal-title{font-size:1rem;color:var(--tx)}
#cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.cal-h{font-family:'Fira Code',monospace;font-size:0.45rem;color:var(--td);padding:4px 0}
.cal-d{padding:8px 0;font-size:0.8rem;color:var(--tx);border-radius:6px;cursor:default;position:relative}
.cal-d.hm{cursor:pointer;font-weight:600}.cal-d.hm:hover{background:var(--accent-dim)}
.cal-d.hm::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent)}
.cal-d.td{color:var(--accent)}.cal-d.em{color:var(--td);opacity:0.3}
#stk-panel{display:none;flex-direction:column;height:0;max-height:0;background:var(--sbg);border-top:1px solid var(--gb);overflow:hidden;transition:max-height 0.25s ease,height 0.25s ease}
#stk-panel.open{display:flex;height:280px;max-height:280px}
#stk-grid{flex:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:6px;overflow-y:auto;padding:10px;-webkit-overflow-scrolling:touch}
#stk-grid::-webkit-scrollbar{width:3px}#stk-grid::-webkit-scrollbar-thumb{background:var(--gb);border-radius:2px}
#stk-empty{grid-column:1/-1;text-align:center;padding:40px 0;color:var(--td);font-size:0.85rem;font-style:italic}
.stk-item{aspect-ratio:1;border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid transparent;transition:all 0.15s;position:relative;background:var(--gl)}
.stk-item:hover{border-color:var(--accent);transform:scale(1.04)}
.stk-item:active{transform:scale(0.96)}
.stk-item img{width:100%;height:100%;object-fit:cover}
.stk-item .stk-del{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,0.6);color:#fff;font-size:11px;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1;backdrop-filter:blur(4px)}
.stk-item:hover .stk-del{display:flex}
#stk-add{display:flex;gap:6px;padding:8px 10px;border-top:1px solid var(--gb);flex-shrink:0;flex-wrap:wrap}
#stk-url{flex:1;background:var(--gl);border:1px solid var(--gb);border-radius:8px;color:var(--td);padding:6px 10px;font-size:0.78rem;font-family:inherit;outline:none;min-width:120px}
#stk-url:focus{border-color:var(--accent-dim)}
#stk-url::placeholder{color:var(--td);opacity:0.5}
#stk-desc{flex:1;background:var(--gl);border:1px solid var(--gb);border-radius:8px;color:var(--tx);padding:6px 10px;font-size:0.78rem;font-family:inherit;outline:none;min-width:100px}
#stk-desc:focus{border-color:var(--accent-dim)}
#stk-desc::placeholder{color:var(--td);opacity:0.5}
#stk-ok{background:var(--accent);color:#000;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:0.85rem;transition:background 0.15s;flex-shrink:0}
#stk-ok:hover{background:#7d9aff}
@media(max-width:768px){#sb{transform:translateX(-100%)}#sb.sw{transform:translateX(0)}#so.sw{display:block}#mn{margin-left:0!important}.mg{max-width:95%}#stk-panel.open{height:240px;max-height:240px}#stk-grid{grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:5px;padding:8px}#stk-add{flex-wrap:wrap}#stk-url,#stk-desc{flex-basis:calc(50% - 20px)}}
.stk-msg{max-width:200px;border-radius:10px;overflow:hidden}
.stk-msg img{width:100%;display:block}
.stk-inline{margin-top:6px}
</style>

<script>
var B='';let T=localStorage.getItem('st')||'',C=null,S=false,AC=null,CID=null,db=null;
const $=id=>document.getElementById(id);

var stkCache=[];
function toggleStk(e){
  if(e)e.stopPropagation();
  var p=$('stk-panel');var open=p.classList.contains('open');
  p.classList.toggle('open',!open);
  $('stk-btn').classList.toggle('open',!open);
  if(!open)stkLoad();
}
async function stkLoad(){
  try{var r=await fetch(B+'/api/stickers',{headers:{'x-auth-token':T}});stkCache=await r.json();}catch(e){stkCache=[];}
  stkRender();
}
function stkRender(){
  var g=$('stk-grid');g.innerHTML='';
  if(!stkCache.length){g.innerHTML='<div id="stk-empty">No stickers yet. Paste a URL to add one.</div>';return}
  stkCache.forEach(function(s){
    var d=document.createElement('div');d.className='stk-item';
    var im=document.createElement('img');im.src=s.url;im.alt=s.name||'';im.loading='lazy';
    im.onerror=function(){d.style.display='none'};
    d.appendChild(im);
    var del=document.createElement('button');del.className='stk-del';del.textContent='×';
    del.onclick=function(e){e.stopPropagation();stkDel(s.id)};
    d.appendChild(del);
    d.onclick=function(){stkSend(s.url,s.desc)};
    if(s.desc){d.title=s.desc}
    g.appendChild(d);
  });
}
async function stkAdd(){
  var url=$('stk-url').value.trim();if(!url)return;
  var desc=$('stk-desc').value.trim();
  $('stk-url').value='';$('stk-desc').value='';
  try{await fetch(B+'/api/stickers',{method:'POST',headers:{'Content-Type':'application/json','x-auth-token':T},body:JSON.stringify({url:url,desc:desc})});}catch(e){}
  await stkLoad();
}
async function stkDel(id){
  try{await fetch(B+'/api/stickers/'+id,{method:'DELETE',headers:{'x-auth-token':T}});}catch(e){}
  await stkLoad();
}

function isNearBottom(){var ca=$('ca');if(!ca)return true;return ca.scrollHeight-ca.scrollTop-ca.clientHeight<80}
function smartScroll(){if(isNearBottom())$('ca').scrollTop=$('ca').scrollHeight}

var _fontSize=parseFloat(localStorage.getItem('fs'))||1.05;
function applyFs(){document.documentElement.style.setProperty('--fs',_fontSize+'rem');var v=$('fs-val');if(v)v.textContent=_fontSize.toFixed(2)}
function adjFs(dir){_fontSize=Math.round(Math.max(0.75,Math.min(1.5,_fontSize+dir*0.05))*100)/100;localStorage.setItem('fs',_fontSize);applyFs()}
applyFs();

// IndexedDB (local cache)
function odb(){return new Promise((r,j)=>{const q=indexedDB.open('companion',1);q.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('c')){d.createObjectStore('c',{keyPath:'id'}).createIndex('u','u')}};q.onsuccess=e=>{db=e.target.result;r()};q.onerror=j})}
function tx(m){return db.transaction('c',m).objectStore('c')}
function _idb_put(c){return new Promise((r,j)=>{tx('readwrite').put(c).onsuccess=()=>r()})}
function _idb_get(id){return new Promise((r,j)=>{const q=tx('readonly').get(id);q.onsuccess=()=>r(q.result);q.onerror=j})}
function _idb_del(id){return new Promise((r,j)=>{tx('readwrite').delete(id).onsuccess=()=>r()})}
function _idb_all(){return new Promise((r,j)=>{const q=tx('readonly').index('u').openCursor(null,'prev');const l=[];q.onsuccess=e=>{const c=e.target.result;if(c){l.push(c.value);c.continue()}else r(l)};q.onerror=j})}
// Server sync layer
async function dp(c){await _idb_put(c);try{await fetch(B+'/api/conversations/'+c.id,{method:'PUT',headers:{'Content-Type':'application/json','x-auth-token':T},body:JSON.stringify(c)})}catch(e){}}
async function dg(id){try{const r=await fetch(B+'/api/conversations/'+id,{headers:{'x-auth-token':T}});if(r.ok){const c=await r.json();await _idb_put(c);return c;}}catch(e){}return _idb_get(id)}
async function dd(id){await _idb_del(id);try{await fetch(B+'/api/conversations/'+id,{method:'DELETE',headers:{'x-auth-token':T}})}catch(e){}}
async function da(){
  var local=await _idb_all();
  try{
    var r=await fetch(B+'/api/conversations',{headers:{'x-auth-token':T}});
    if(r.ok){
      var list=await r.json();var serverIds=new Set(list.map(function(x){return x.id}));
      var full=[];for(var i=0;i<list.length;i++){var c=await dg(list[i].id);if(c)full.push(c)}
      for(var j=0;j<local.length;j++){if(!serverIds.has(local[j].id)){full.push(local[j]);try{await fetch(B+'/api/conversations/'+local[j].id,{method:'PUT',headers:{'Content-Type':'application/json','x-auth-token':T},body:JSON.stringify(local[j])})}catch(e){}}}
      full.sort(function(a,b){return(b.u||0)-(a.u||0)});return full;
    }
  }catch(e){}return local}

// Folders
var FL=[];
async function loadFolders(){try{const r=await fetch(B+'/api/folders',{headers:{'x-auth-token':T}});if(r.ok)FL=await r.json();}catch(e){FL=JSON.parse(localStorage.getItem('folders')||'[]')}}
async function saveFolders(){localStorage.setItem('folders',JSON.stringify(FL));try{await fetch(B+'/api/folders',{method:'PUT',headers:{'Content-Type':'application/json','x-auth-token':T},body:JSON.stringify(FL)})}catch(e){}}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// Auth
async function auth(t){try{const r=await fetch(B+'/api/config',{headers:{'x-auth-token':t}});if(r.ok){T=t;localStorage.setItem('st',t);C=await r.json();$('ao').style.display='none';$('app').style.display='block';try{await odb()}catch(e){console.error('[auth] odb:',e)}try{await init()}catch(e){console.error('[auth] init:',e)}return true}}catch(e){$('ae').textContent='error: '+e.message}return false}
$('ai').addEventListener('keydown',async e=>{if(e.key==='Enter'){const ok=await auth($('ai').value.trim());$('ae').textContent=ok?'':'wrong'}});
if(T){auth(T).then(ok=>{if(!ok)$('ao').style.display='flex'})}else{$('ao').style.display='flex'}

// Convert stored message to API format (file arrays -> plain text)
function msgForAPI(m){
  if(!Array.isArray(m.content))return{role:m.role,content:m.content};
  var hasImg=m.content.some(function(p){return p.type==='image'});
  if(hasImg)return{role:m.role,content:m.content};
  var parts=m.content.map(function(p){if(p.type==='file')return'['+p.name+']\n'+p.data;if(p.type==='text')return p.text;return ''}).filter(Boolean);
  return{role:m.role,content:parts.join('\n\n')}
}

// CC↔API message interleaving
function filterCCMessages(msgs){
  var ccSync=localStorage.getItem('cc-sync')==='1';
  if(!ccSync){return msgs.filter(function(m){return m.source!=='cc'})}
  var result=[];var ccBlock=[];
  for(var i=0;i<msgs.length;i++){
    if(msgs[i].source==='cc'){ccBlock.push(msgs[i])}
    else{
      if(ccBlock.length>0){
        var summary=ccBlock.map(function(m){
          var txt=typeof m.content==='string'?m.content:JSON.stringify(m.content);
          return (m.role==='user'?'User(CC)':'Assistant(CC)')+': '+txt.replace(/\n/g,' ').slice(0,120)
        }).join(' | ');
        result.push({role:'user',content:'[CC session summary] '+summary});
        ccBlock=[]
      }
      result.push(msgs[i])
    }
  }
  return result
}

// Context trimming

async function init(){await loadFolders();initAv();const cs=await da();if(cs.length>0){CID=cs[0].id;await sw(cs[0].id)}else await nc();ssb();
  if(typeof ccMode==='undefined'||!ccMode){const ac=C.providers&&C.providers.find(p=>p.active);$('ml').textContent=ac?(ac.model||'').split('/').pop():'';}else{$('ml').textContent='Claude Code';}}

// === Search & Calendar ===
var searchTimer=null;
$('sr-input').addEventListener('input',function(){
  clearTimeout(searchTimer);
  var q=this.value.trim();
  if(!q){$('cl').style.display='';return}
  searchTimer=setTimeout(function(){doSearch(q)},300);
});
$('sr-input').addEventListener('keydown',function(e){
  if(e.key==='Escape'){this.value='';$('cl').style.display='';this.blur()}
});

async function doSearch(q){
  var all=await da();
  var results=[];
  var ql=q.toLowerCase();
  all.forEach(function(c){
    (c.m||[]).forEach(function(m,mi){
      var txt=typeof m.content==='string'?m.content:
        Array.isArray(m.content)?m.content.map(function(p){return p.text||''}).join(' '):'';
      var idx=txt.toLowerCase().indexOf(ql);
      if(idx>=0){
        var start=Math.max(0,idx-30);
        var snip=txt.substr(start,q.length+60);
        if(start>0)snip='...'+snip;
        if(start+q.length+60<txt.length)snip+='...';
        results.push({cid:c.id,title:c.title||'Chat',snip:snip,q:q,ts:m.ts||null,mi:mi,role:m.role});
      }
    });
  });
  $('cl').style.display='none';
  var existing=$('sr-results');
  if(existing)existing.remove();
  var wrap=document.createElement('div');wrap.id='sr-results';
  if(!results.length){
    wrap.innerHTML='<div class="sr-empty">No results</div>';
  } else {
    results.slice(0,50).forEach(function(r){
      var d=document.createElement('div');d.className='sr-item';
      var hl=r.snip.replace(new RegExp('('+r.q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
      var timeStr=r.ts?fmtTs(r.ts):'';
      d.innerHTML='<div class="sr-title">'+(r.role==='user'?'↑ ':'')+(r.title||'Chat')+'</div><div class="sr-text">'+hl+'</div>'+(timeStr?'<div class="sr-time">'+timeStr+'</div>':'');
      d.addEventListener('click',function(){
        $('sr-input').value='';$('cl').style.display='';wrap.remove();
        jumpToMsg(r.cid,r.mi);
      });
      wrap.appendChild(d);
    });
  }
  $('cl').parentNode.insertBefore(wrap,$('cl'));
}

async function jumpToMsg(cid,mi){
  await sw(cid);
  var msgs=$('ca').querySelectorAll('.mg');
  if(msgs[mi]){
    msgs[mi].scrollIntoView({behavior:'smooth',block:'center'});
    msgs[mi].style.outline='2px solid var(--accent)';
    setTimeout(function(){msgs[mi].style.outline='';},2000);
  }
}

// Calendar
var calYear,calMonth,calDates={};
$('sr-cal').addEventListener('click',async function(){
  calDates={};
  var all=await da();
  all.forEach(function(c){
    (c.m||[]).forEach(function(m){
      if(m.ts){
        var d=new Date(m.ts);
        var key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
        if(!calDates[key])calDates[key]={cid:c.id,mi:0};
      }
    });
  });
  var now=new Date();
  calYear=now.getFullYear();calMonth=now.getMonth();
  renderCal();
  $('cal-ov').classList.add('show');
});
$('cal-prev').addEventListener('click',function(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCal();});
$('cal-next').addEventListener('click',function(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCal();});

function renderCal(){
  var now=new Date();
  var months=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  $('cal-title').textContent=calYear+'年 '+months[calMonth];
  var first=new Date(calYear,calMonth,1);
  var lastDay=new Date(calYear,calMonth+1,0).getDate();
  var startDay=first.getDay();
  var h='';
  ['日','一','二','三','四','五','六'].forEach(function(d){h+='<div class="cal-h">'+d+'</div>';});
  for(var i=0;i<startDay;i++)h+='<div class="cal-d em"></div>';
  for(var d=1;d<=lastDay;d++){
    var key=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var isToday=d===now.getDate()&&calMonth===now.getMonth()&&calYear===now.getFullYear();
    var hasMsg=calDates[key];
    var cls='cal-d'+(isToday?' td':'')+(hasMsg?' hm':'');
    h+='<div class="'+cls+'" data-date="'+key+'">'+d+'</div>';
  }
  $('cal-grid').innerHTML=h;
  $('cal-grid').querySelectorAll('.cal-d.hm').forEach(function(el){
    el.addEventListener('click',function(){
      var dt=this.dataset.date;
      var info=calDates[dt];
      if(info){
        $('cal-ov').classList.remove('show');
        jumpToMsg(info.cid,info.mi);
      }
    });
  });
}

// === CC Mode ===
var ccMode=localStorage.getItem('cc-mode')==='1';
var ccConnected=false;

function setCCMode(on){
  ccMode=on;
  localStorage.setItem('cc-mode',on?'1':'0');
  S=false;ccPendingEl=null;$('se').disabled=false;
  $('se').innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>';
  updateModeUI();
  if(on){connectCC();}else{ccConnected=false;if(ccPollTimer){clearInterval(ccPollTimer);ccPollTimer=null;ccPollMode=false;}}
}

function updateModeUI(){
  var api=$('mode-api'),cc=$('mode-cc'),st=$('cc-status'),ml=$('ml');
  if(ccMode){
    cc.style.background='var(--accent)';cc.style.color='#000';
    api.style.background='transparent';api.style.color='var(--td)';
    st.textContent=ccConnected?'connected':(_ccState||'idle');
    ml.textContent='Claude Code';
  }else{
    api.style.background='var(--accent)';api.style.color='#000';
    cc.style.background='transparent';cc.style.color='var(--td)';
    st.textContent='';
    var ac=C&&C.providers&&C.providers.find(function(p){return p.active});
    ml.textContent=ac?(ac.model||'').split('/').pop():'';
  }
}

var _ccRetry=3000,_ccAttempt=0,_ccState='idle';
var ccPollMode=false,ccPollTimer=null,ccPollSince=0;
function _ccSt(s){_ccState=s;var el=$('cc-status');if(el&&ccMode)el.textContent=s;}

function handleCCMsg(msg){
  if(msg.type==='ping'||msg.type==='auth_required'||msg.type==='history')return;
  if(msg.type==='auth_ok'){ccConnected=true;_ccRetry=3000;_ccAttempt=0;_ccSt('connected');updateModeUI();}
  else if(msg.type==='auth_fail'){ccConnected=false;updateModeUI();}
  else if(msg.type==='cc_status'){ccConnected=msg.alive;updateModeUI();}
  else if(msg.type==='cc_tool'){
    if(ccPendingEl){
      var ti=document.createElement('div');ti.className='ti';ti.dataset.tool=msg.name;
      var tn=document.createElement('span');tn.className='ti-name';tn.textContent='◆ '+msg.name+(msg.result?' ✓':'');ti.appendChild(tn);
      if(msg.result){var tr=document.createElement('span');tr.className='ti-res';tr.textContent=(msg.args?msg.args+'\n':'')+msg.result;ti.appendChild(tr);tn.onclick=function(){tr.classList.toggle('open')}}
      $('ca').insertBefore(ti,ccPendingEl.closest('.msg-row')||ccPendingEl);
    }
  }
  else if(msg.type==='cc_thinking'){
    if(ccPendingEl&&!ccPendingEl._tkWrap){var _tw=document.createElement('div');_tw.className='tk-wrap';var _tl=document.createElement('div');_tl.className='tk-live';_tl.textContent='thinking...';_tw.appendChild(_tl);var _md=ccPendingEl.querySelector('.md');ccPendingEl.insertBefore(_tw,_md);ccPendingEl._tkWrap=_tw}
  }
  else if(msg.type==='message'&&msg.role==='assistant'){
    var el=ccPendingEl;
    if(!el){el=ame('s',msg.content);}
    else{var md=el.querySelector('.md');md.innerHTML=rmd(msg.content);}
    if(el._tkWrap){el._tkWrap.remove();el._tkWrap=null}
    var tk=msg.thinking||'';
    if(tk){mkThinkPanel(el,tk)}
    ccPendingEl=null;
    S=false;$('se').disabled=false;
    $('se').innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>';
    if(CID){var _m={role:'assistant',content:msg.content,ts:Date.now(),source:'cc'};if(tk)_m.thinking=tk;(async function(){try{var c=await _idb_get(CID);if(!c)c=await dg(CID);if(!c)c={id:CID,title:'Chat',m:[],c:Date.now(),u:Date.now()};c.m.push(_m);c.u=Date.now();await dp(c)}catch(e){console.error('cc save:',e)}})();}
  }
}

function connectCC(){
  startCCPoll();
}

function startCCPoll(){
  if(ccPollMode)return;
  ccPollMode=true;ccPollSince=Date.now()-30000;
  _ccSt('poll starting');
  doPoll();
  ccPollTimer=setInterval(doPoll,1000);
}
function doPoll(){
  fetch(B+'/cc-poll?since='+ccPollSince,{headers:{'x-auth-token':T}}).then(function(r){return r.json();}).then(function(d){
    if(!d.ok)return;
    var was=ccConnected;
    ccConnected=d.cc_alive;
    if(ccConnected!==was)updateModeUI();
    ccPollSince=d.t||Date.now();
    if(d.messages&&d.messages.length){d.messages.forEach(handleCCMsg);}
    if(ccConnected&&_ccState!=='connected')_ccSt('connected');
    else if(!ccConnected&&_ccState!=='waiting for cc')_ccSt('waiting for cc');
  }).catch(function(){_ccSt('poll error');});
}

var ccPendingEl=null;
function sendCC(text,img){
  if(!ccConnected)return;
  var payload={content:text||''};
  if(img&&img.data&&!img.isText){payload.image={data:img.data,type:img.type}}
  fetch(B+'/cc-msg',{method:'POST',headers:{'Content-Type':'application/json','x-auth-token':T},body:JSON.stringify(payload)}).catch(function(){_ccSt('send error');});
  S=true;$('se').disabled=true;
  ccPendingEl=ame('s','');
  var md=ccPendingEl.querySelector('.md');
  md.innerHTML='<span class="cur"></span>';
}

updateModeUI();
if(ccMode)connectCC();

// --- Sticker Send ---
function stkSend(url,desc){
  $('stk-panel').classList.remove('open');
  $('stk-btn').classList.remove('open');
  var stkTag=desc?'[sticker:'+url+'|'+desc+']':'[sticker:'+url+']';
  var mi=$('mi');
  var cur=mi.value;
  mi.value=cur?(cur+' '+stkTag):stkTag;
  mi.focus();
  mi.style.height='auto';mi.style.height=Math.max(mi.scrollHeight,40)+'px';
}
document.addEventListener('click',function(e){if(!e.target.closest('#stk-panel')&&!e.target.closest('#stk-btn')){$('stk-panel').classList.remove('open');$('stk-btn').classList.remove('open')}});

</script>
